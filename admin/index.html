<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Levmich Studio — Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="stylesheet" href="admin.css?v=5" />
</head>
<body class="admin-page">

  <main class="login-wrap">
    <section class="login-card">

      <div class="login-brand">
        <img class="login-logo" src="../Assets/SVG_files/Levmich_Studio_Logo_01.svg" alt="Levmich Studio" />
        <p class="login-subtitle">Система монитора</p>
      </div>

      <form class="login-form" id="loginForm" autocomplete="off" novalidate>
        <input
          type="text"
          class="login-input"
          id="cmdInput"
          placeholder="/Command"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <input
          type="password"
          class="login-input"
          id="pwdInput"
          placeholder="Password"
          autocomplete="current-password"
        />
        <button type="submit" class="btn-primary" id="loginBtn">Войти</button>
        <p class="login-note__error" id="loginError" aria-live="polite"></p>
      </form>

      <p class="login-note">
        *Введите команду, которая откроет<br/>
        вам доступ к платформе монитора.<br/>
        Сотруднику выдаётся индивидуальная команда.
      </p>

    </section>
  </main>

  <script src="admin.js?v=5"></script>
</body>
</html>
