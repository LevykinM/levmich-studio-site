<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Levmich Studio — Admin · Кейсы</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="stylesheet" href="admin.css?v=4" />
</head>
<body class="admin-page cases-page" id="casesPage">

  <div class="user-pill">
    <div class="user-pill__info">
      <span class="user-pill__name">Михаил</span>
      <span class="user-pill__role">/admin</span>
    </div>
    <button class="user-pill__logout" id="logoutBtn" type="button" aria-label="Выйти">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 2.5H3.5A1.5 1.5 0 0 0 2 4v8A1.5 1.5 0 0 0 3.5 13.5H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M10 11l3-3-3-3M13 8H6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <a class="back-pill" href="dashboard.html" aria-label="Назад">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M8.5 2.5 4 7l4.5 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Назад
  </a>

  <main class="cases-main">

    <header class="cases-header">
      <h1 class="cases-title">Выбери кейс<br/>и редактируй</h1>
    </header>

    <div class="cases-grid" id="casesGrid">

      <button class="case-card case-card--add" type="button" id="addCaseBtn" aria-label="Добавить кейс">
        <span class="case-card__title">Добавить кейс</span>
        <svg class="case-card__plus" viewBox="0 0 44 44" fill="none" aria-hidden="true">
          <path d="M22 8v28M8 22h28" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
        </svg>
      </button>

      <a class="case-card case-card--item" href="edit-case.html?id=front" data-case="front">
        <img class="case-card__img" src="../Assets/Main_page/Property 1=Photo 1.webp" alt="" />
        <span class="case-card__edit">Редактировать</span>
      </a>

      <a class="case-card case-card--item" href="edit-case.html?id=three" data-case="three">
        <img class="case-card__img" src="../Assets/Main_page/Property 1=Photo 3.webp" alt="" />
        <span class="case-card__edit">Редактировать</span>
      </a>

      <a class="case-card case-card--item" href="edit-case.html?id=wedding" data-case="wedding">
        <img class="case-card__img" src="../Assets/Main_page/Property 1=Photo 2.webp" alt="" />
        <span class="case-card__edit">Редактировать</span>
      </a>

    </div>

  </main>

  <script src="admin.js?v=4"></script>
</body>
</html>
