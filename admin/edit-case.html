<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Levmich Studio — Admin · Конструктор</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="stylesheet" href="admin.css?v=14" />
</head>
<body class="admin-page editor-page" id="editorPage">

  <!-- corner label -->
  <span class="corner-label" id="cornerLabel">Создание кейса</span>
  <aside class="draft-banner" aria-label="Статус конструктора">
    <strong>Черновик-конструктор</strong>
    <span>Сохраняет изменения только в этом браузере. Публикация на сайт доступна через основной экран админки.</span>
  </aside>

  <!-- =========================================================
       SETUP VIEW — «Новый кейс» (только для нового кейса)
       ========================================================= -->
  <section class="setup-view" id="setupView" hidden>
    <h1 class="setup-title">Новый кейс</h1>

    <div class="setup-card">
      <div class="setup-field">
        <label class="setup-label" for="setupName">Введи название кейса</label>
        <input class="setup-input" id="setupName" type="text" placeholder="Название" maxlength="40" />
      </div>

      <div class="setup-field">
        <span class="setup-label">Обложка кейса</span>
        <label class="dropzone" id="setupDrop">
          <input type="file" id="setupCoverInput" accept="image/*" hidden />
          <img class="dropzone__preview" id="setupCoverPreview" alt="" hidden />
          <span class="dropzone__hint" id="setupDropHint">
            <img src="../public/figma-assets/admin-system-icons/photo.png" alt="" aria-hidden="true" />
            Драгндропни или вставь с компа
          </span>
        </label>
      </div>

      <div class="setup-field">
        <span class="setup-label">Выбери категорию кейса</span>
        <div class="cat-pills" id="setupCats">
          <button type="button" class="cat-pill cat--branding" data-cat="branding">Брендинг <img src="../Assets/SVG_files/mage_stars-c.svg" alt="" /></button>
          <button type="button" class="cat-pill cat--site" data-cat="site">Сайт <img src="../Assets/SVG_files/dashicons_admin-site-alt3.svg" alt="" /></button>
          <button type="button" class="cat-pill cat--app" data-cat="app">Приложение <span class="cat-pill__emoji">📱</span></button>
        </div>
      </div>

      <button class="btn-primary" id="setupContinue" type="button">Продолжить</button>
    </div>
  </section>

  <!-- =========================================================
       EDITOR VIEW — конструктор блоков
       ========================================================= -->
  <section class="editor-view" id="editorView" hidden>

    <!-- top bar -->
    <button class="round-btn editor-back" id="editorBack" type="button" aria-label="Назад">
      <img src="../public/figma-assets/admin-system-icons/previous-step.png" alt="" aria-hidden="true" />
    </button>

    <div class="editor-head" id="editorHead">
      <h1 class="editor-title" id="editorTitle">Название кейса</h1>
      <div class="editor-meta">
        <button class="round-btn round-btn--sm" id="editMetaBtn" type="button" aria-label="Изменить название и категории">
          <img src="../public/figma-assets/admin-system-icons/correct.png" alt="" aria-hidden="true" />
        </button>
        <div class="editor-tags" id="editorTags"></div>
      </div>
    </div>

    <!-- blocks stack -->
    <div class="blocks-stack" id="blocksStack"></div>

    <div class="blocks-empty" id="blocksEmpty">
      <p>Пусто. Добавь блок из дока внизу&nbsp;↓</p>
    </div>

    <!-- bottom dock -->
    <div class="editor-dock">
      <div class="editor-dock__group">
        <button class="dock-btn dock-btn--text"   data-add="text"   type="button" aria-label="Текстовый блок">
          <img src="../public/figma-assets/admin-system-icons/text.png" alt="" aria-hidden="true" />
        </button>
        <button class="dock-btn dock-btn--image"  data-add="image"  type="button" aria-label="Блок изображений">
          <img src="../public/figma-assets/admin-system-icons/photo.png" alt="" aria-hidden="true" />
        </button>
        <button class="dock-btn dock-btn--video"  data-add="video"  type="button" aria-label="Видео-блок">
          <img src="../public/figma-assets/admin-system-icons/video.png" alt="" aria-hidden="true" />
        </button>
        <button class="dock-btn dock-btn--result" data-add="result" type="button" aria-label="Блок «Было разработано»">
          <img src="../public/figma-assets/admin-system-icons/punkts.png" alt="" aria-hidden="true" />
        </button>
      </div>

      <button class="dock-btn dock-btn--trash" id="deleteSelected" type="button" aria-label="Удалить выбранный блок">
        <img src="../public/figma-assets/admin-system-icons/delete.png" alt="" aria-hidden="true" />
      </button>

      <button class="dock-btn dock-btn--save" id="saveCase" type="button" aria-label="Сохранить кейс">
        <img src="../public/figma-assets/admin-system-icons/save.png" alt="" aria-hidden="true" />
      </button>
    </div>
  </section>

  <!-- =========================================================
       META MODAL — правка названия/обложки/категорий
       ========================================================= -->
  <div class="modal-overlay" id="metaModal" hidden>
    <div class="modal-card">
      <h2 class="modal-title">Кейс</h2>
      <div class="setup-field">
        <label class="setup-label" for="metaName">Название</label>
        <input class="setup-input" id="metaName" type="text" maxlength="40" />
      </div>
      <div class="setup-field">
        <span class="setup-label">Обложка</span>
        <label class="dropzone dropzone--sm" id="metaDrop">
          <input type="file" id="metaCoverInput" accept="image/*" hidden />
          <img class="dropzone__preview" id="metaCoverPreview" alt="" hidden />
          <span class="dropzone__hint" id="metaDropHint">
            <img src="../public/figma-assets/admin-system-icons/photo.png" alt="" aria-hidden="true" />
            Драгндропни или вставь
          </span>
        </label>
      </div>
      <div class="setup-field">
        <span class="setup-label">Категории</span>
        <div class="cat-pills" id="metaCats">
          <button type="button" class="cat-pill cat--branding" data-cat="branding">Брендинг <img src="../Assets/SVG_files/mage_stars-c.svg" alt="" /></button>
          <button type="button" class="cat-pill cat--site" data-cat="site">Сайт <img src="../Assets/SVG_files/dashicons_admin-site-alt3.svg" alt="" /></button>
          <button type="button" class="cat-pill cat--app" data-cat="app">Приложение <span class="cat-pill__emoji">📱</span></button>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" id="metaCancel" type="button">Отмена</button>
        <button class="btn-primary" id="metaApply" type="button">Готово</button>
      </div>
    </div>
  </div>

  <!-- toast -->
  <div class="toast" id="toast" hidden></div>

  <script src="admin.js?v=11"></script>
  <script src="cases-data.js?v=8"></script>
  <script src="edit-case.js?v=11"></script>
</body>
</html>
