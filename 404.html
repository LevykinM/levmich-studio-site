<!doctype html>
<html lang="ru" class="error-html">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>404 — страница не найдена | Levmich Studio</title>
  <meta name="description" content="Страница Levmich Studio не найдена." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Host+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/Assets/styles/style.css?v=149" />
</head>
<body class="error-page">
  <main class="not-found" aria-labelledby="not-found-title">
    <h1 class="not-found__sr" id="not-found-title">404 — страница не найдена</h1>

    <div class="not-found__top">
      <p class="not-found__message">Похоже, такой страницы<br />не существует, увы.</p>
      <img class="not-found__logo" src="/Assets/SVG_files/Levmich_Studio_Logo_01.svg" alt="Levmich Studio" />
    </div>

    <picture class="not-found__code-art" aria-hidden="true">
      <source media="(orientation: portrait), (max-width: 768px)" srcset="/public/figma-assets/404-mobile-vector.svg" />
      <img src="/public/figma-assets/404-desktop-vector.svg" alt="" />
    </picture>

    <a class="not-found__return" href="/ru/main" aria-label="Вернуться на главную страницу">
      <span>Вернуться<br />на главную<br />страницу</span>
      <svg viewBox="0 0 18 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M15 3L3 17L15 31" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <nav class="not-found__menu" aria-label="Навигация по сайту">
      <ul class="not-found__menu-list">
        <li>
          <a class="not-found__menu-link" href="/ru/main" data-scroll-target="about">
            <span>Обо мне</span>
            <img src="/Assets/SVG_files/mini_me.svg" alt="" />
          </a>
        </li>
        <li>
          <a class="not-found__menu-link" href="/ru/main" data-scroll-target="services">
            <span>Услуги</span>
            <img src="/Assets/SVG_files/Consulation.svg" alt="" />
          </a>
        </li>
        <li>
          <a class="not-found__menu-link" href="/ru/main" data-scroll-target="portfolio">
            <span>Кейсы</span>
            <img src="/Assets/SVG_files/Case.svg" alt="" />
          </a>
        </li>
      </ul>
    </nav>
  </main>
  <script>
    (function() {
      var firstSegment = window.location.pathname.split('/').filter(Boolean)[0];
      var lang = firstSegment === 'en' ? 'en' : 'ru';
      document.querySelectorAll('a[href^="/ru/main"]').forEach(function(link) {
        link.setAttribute('href', '/' + lang + '/main');
      });
      if (lang === 'en') {
        document.documentElement.lang = 'en';
        document.title = '404 — page not found | Levmich Studio';
        var title = document.getElementById('not-found-title');
        var message = document.querySelector('.not-found__message');
        var returnLink = document.querySelector('.not-found__return');
        var returnText = returnLink && returnLink.querySelector('span');
        var menuLabels = document.querySelectorAll('.not-found__menu-link span');
        if (title) title.textContent = '404 — page not found';
        if (message) message.innerHTML = 'Looks like this page<br />does not exist, alas.';
        if (returnLink) returnLink.setAttribute('aria-label', 'Back to main page');
        if (returnText) returnText.innerHTML = 'Back<br />to main<br />page';
        ['About me', 'Services', 'Cases'].forEach(function(label, index) {
          if (menuLabels[index]) menuLabels[index].textContent = label;
        });
      }
    })();

    document.addEventListener('click', function(event) {
      var link = event.target.closest('a[data-scroll-target]');
      if (!link) return;
      try {
        sessionStorage.setItem('levmich-scroll-target', link.dataset.scrollTarget || 'hero');
      } catch (_) {}
    });
  </script>
</body>
</html>
